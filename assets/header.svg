<svg width="900" height="240" viewBox="0 0 900 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Iago Russi Ferla. Arquiteto de Soluções e IA.">
  <defs>
    <clipPath id="frame"><rect width="900" height="240" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#frame)" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Inter, Roboto, sans-serif">
    <rect width="900" height="240" fill="#000000"/>

    <!-- headline -->
    <g opacity="0">
      <text x="450" y="108" text-anchor="middle" font-size="52" font-weight="600" letter-spacing="-1" fill="#f5f5f7">Iago Russi Ferla.</text>
      <animate attributeName="opacity" from="0" to="1" dur="0.9s" begin="0.15s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="0 14" to="0 0" dur="0.9s" begin="0.15s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0 14;0 0"/>
    </g>

    <!-- tagline -->
    <g opacity="0">
      <text x="450" y="148" text-anchor="middle" font-size="21" font-weight="400" letter-spacing="0.1" fill="#86868b">Arquiteto de Soluções &amp; IA. Agentes autônomos na AWS.</text>
      <animate attributeName="opacity" from="0" to="1" dur="0.9s" begin="0.45s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="0 14" to="0 0" dur="0.9s" begin="0.45s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0 14;0 0"/>
    </g>

    <!-- caption -->
    <g opacity="0">
      <circle cx="316" cy="192" r="3.5" fill="#2997ff">
        <animate attributeName="opacity" values="1;0.35;1" dur="3s" begin="1.6s" repeatCount="indefinite"/>
      </circle>
      <text x="330" y="197" font-size="14" font-weight="400" letter-spacing="-0.2" fill="#cccccc">Dati · Blumenau, SC · 2x AWS Certified</text>
      <animate attributeName="opacity" from="0" to="1" dur="0.9s" begin="0.75s" fill="freeze"/>
    </g>
  </g>
</svg>
