<svg width="900" height="260" viewBox="0 0 900 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Iago Russi Ferla — Solutions & AI Architect">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05060f"/>
      <stop offset="0.5" stop-color="#0a0e1f"/>
      <stop offset="1" stop-color="#05060f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c3aed">
        <animate attributeName="stop-color" values="#7c3aed;#06b6d4;#f59e0b;#7c3aed" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#06b6d4">
        <animate attributeName="stop-color" values="#06b6d4;#f59e0b;#7c3aed;#06b6d4" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#f59e0b">
        <animate attributeName="stop-color" values="#f59e0b;#7c3aed;#06b6d4;#f59e0b" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="frame"><rect width="900" height="260" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="900" height="260" fill="url(#bg)"/>

    <!-- grid -->
    <g stroke="#1e2747" stroke-width="1" opacity="0.5">
      <path d="M0 40H900M0 80H900M0 120H900M0 160H900M0 200H900M0 240H900"/>
      <path d="M60 0V260M120 0V260M180 0V260M240 0V260M300 0V260M360 0V260M420 0V260M480 0V260M540 0V260M600 0V260M660 0V260M720 0V260M780 0V260M840 0V260"/>
    </g>

    <!-- glow orbs -->
    <circle cx="780" cy="60" r="180" fill="url(#glow)">
      <animate attributeName="cx" values="780;820;780" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="220" r="160" fill="url(#glow)">
      <animate attributeName="cy" values="220;180;220" dur="12s" repeatCount="indefinite"/>
    </circle>

    <!-- scanning line -->
    <rect x="0" y="0" width="900" height="2" fill="url(#accent)" opacity="0.6">
      <animate attributeName="y" values="-2;262" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- neural nodes right side -->
    <g>
      <g stroke="#334166" stroke-width="1">
        <line x1="700" y1="70" x2="770" y2="110"/>
        <line x1="700" y1="70" x2="780" y2="55"/>
        <line x1="770" y1="110" x2="840" y2="80"/>
        <line x1="770" y1="110" x2="760" y2="180"/>
        <line x1="780" y1="55" x2="840" y2="80"/>
        <line x1="840" y1="80" x2="850" y2="160"/>
        <line x1="760" y1="180" x2="850" y2="160"/>
        <line x1="700" y1="70" x2="660" y2="140"/>
        <line x1="660" y1="140" x2="760" y2="180"/>
      </g>
      <g fill="#06b6d4">
        <circle cx="700" cy="70" r="4"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
        <circle cx="770" cy="110" r="5" fill="#7c3aed"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
        <circle cx="780" cy="55" r="3"><animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/></circle>
        <circle cx="840" cy="80" r="4" fill="#f59e0b"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/></circle>
        <circle cx="760" cy="180" r="4"><animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite"/></circle>
        <circle cx="850" cy="160" r="3" fill="#7c3aed"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/></circle>
        <circle cx="660" cy="140" r="3" fill="#f59e0b"><animate attributeName="opacity" values="1;0.5;1" dur="2.8s" repeatCount="indefinite"/></circle>
      </g>
      <!-- pulse traveling -->
      <circle r="2.5" fill="#ffffff">
        <animateMotion path="M700 70 L770 110 L840 80 L850 160 L760 180 L660 140 Z" dur="5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- name -->
    <text x="56" y="118" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="46" font-weight="800" fill="#f1f5f9" letter-spacing="1">IAGO RUSSI FERLA</text>

    <!-- animated underline -->
    <rect x="56" y="132" height="4" rx="2" fill="url(#accent)">
      <animate attributeName="width" values="0;420;420" keyTimes="0;0.3;1" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- typing roles -->
    <g font-family="'Cascadia Code', 'Fira Code', monospace" font-size="19" fill="#94a3b8">
      <text x="56" y="172">
        <tspan fill="#06b6d4">&gt;</tspan>
        <tspan> Solutions &amp; AI Architect @ Dati</tspan>
        <animate attributeName="opacity" values="1;1;0;0;0;0;1" keyTimes="0;0.30;0.33;0.63;0.66;0.97;1" dur="12s" repeatCount="indefinite"/>
      </text>
      <text x="56" y="172" opacity="0">
        <tspan fill="#7c3aed">&gt;</tspan>
        <tspan> Construindo agentes autônomos na AWS</tspan>
        <animate attributeName="opacity" values="0;0;1;1;0;0;0" keyTimes="0;0.33;0.36;0.63;0.66;0.97;1" dur="12s" repeatCount="indefinite"/>
      </text>
      <text x="56" y="172" opacity="0">
        <tspan fill="#f59e0b">&gt;</tspan>
        <tspan> 2x AWS Certified · GenAI · Multi-agents</tspan>
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.66;0.69;0.97;1" dur="12s" repeatCount="indefinite"/>
      </text>
      <!-- cursor -->
      <rect x="480" y="158" width="10" height="18" fill="#06b6d4">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- bottom status bar -->
    <g font-family="'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#475569">
      <text x="56" y="225">⚡ Blumenau · SC · Brasil</text>
      <text x="310" y="225" fill="#06b6d4">● online</text>
      <text x="420" y="225">aws · genai · agents · react · python · java</text>
    </g>

    <!-- border -->
    <rect x="1" y="1" width="898" height="258" rx="15" stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.8"/>
  </g>
</svg>
