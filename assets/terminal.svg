<svg width="900" height="300" viewBox="0 0 900 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="agent runtime">
  <defs>
    <clipPath id="tframe"><rect width="900" height="300" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#tframe)" font-family="'SF Mono', ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="14">
    <rect width="900" height="300" fill="#000000"/>
    <rect width="900" height="44" fill="#1d1d1f"/>
    <circle cx="26" cy="22" r="5.5" fill="#48484a"/>
    <circle cx="48" cy="22" r="5.5" fill="#48484a"/>
    <circle cx="70" cy="22" r="5.5" fill="#48484a"/>
    <text x="450" y="27" text-anchor="middle" fill="#86868b" font-size="12" letter-spacing="-0.12">iago — agent-runtime — 80×24</text>

    <text x="32" y="78" opacity="0">
      <tspan fill="#2997ff">$</tspan><tspan fill="#f5f5f7"> deploy --agent solutions-architect --profile iago</tspan>
      <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.04;1" dur="14s" repeatCount="indefinite"/>
    </text>

    <text x="32" y="108" fill="#86868b" opacity="0">
      contexto humano ............... <tspan fill="#f5f5f7">carregado</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.10;0.14;1" dur="14s" repeatCount="indefinite"/>
    </text>

    <text x="32" y="136" fill="#86868b" opacity="0">
      certificações ................. <tspan fill="#f5f5f7">AWS Cloud Practitioner · AWS AI Practitioner</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.18;0.22;1" dur="14s" repeatCount="indefinite"/>
    </text>

    <text x="32" y="164" fill="#86868b" opacity="0">
      stack ......................... <tspan fill="#f5f5f7">aws · genai · multi-agents · python · java · react</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.26;0.30;1" dur="14s" repeatCount="indefinite"/>
    </text>

    <text x="32" y="192" fill="#86868b" opacity="0">
      background .................... <tspan fill="#f5f5f7">4 anos de edição de vídeo — precisão visual</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.34;0.38;1" dur="14s" repeatCount="indefinite"/>
    </text>

    <text x="32" y="228" opacity="0">
      <tspan fill="#2997ff">✓</tspan><tspan fill="#f5f5f7"> agente online — construindo sistemas que pensam sozinhos</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.46;0.50;1" dur="14s" repeatCount="indefinite"/>
    </text>

    <text x="32" y="264" opacity="0">
      <tspan fill="#2997ff">$</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.56;0.60;1" dur="14s" repeatCount="indefinite"/>
    </text>
    <rect x="50" y="251" width="9" height="17" fill="#f5f5f7" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0;1;0;1;0;1;0" keyTimes="0;0.60;0.64;0.68;0.72;0.76;0.80;0.88;0.96;1" dur="14s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
